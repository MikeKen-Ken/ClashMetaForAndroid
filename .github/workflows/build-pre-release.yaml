name: Build Pre-Release
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  BuildPreRelease:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      
      - name: Checkout submodules
        run: git submodule update --init --recursive --remote --force

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true # Always check for the latest patch release

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Update CA
        run: |
          sudo apt-get update && sudo apt-get install ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: Tidy Go modules
        run: |
          cd core/src/foss/golang && go mod tidy

      - name: Setup fixed signing
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          # MUST 使用仓库中固定的 keystore，NEVER 在 CI 里重新生成
          if [ ! -f release.keystore ]; then
            echo "release.keystore is missing in repository, abort."
            exit 1
          fi

          # 必填 secrets 校验，避免写入空值导致签名异常
          if [ -z "$SIGNING_STORE_PASSWORD" ] || [ -z "$SIGNING_KEY_ALIAS" ] || [ -z "$SIGNING_KEY_PASSWORD" ]; then
            echo "Signing secrets are missing, abort."
            exit 1
          fi

          # 验证 alias 与密码是否匹配固定 keystore
          keytool -list -keystore release.keystore -storepass "$SIGNING_STORE_PASSWORD" -alias "$SIGNING_KEY_ALIAS" >/dev/null

          # 生成 signing.properties 给 Gradle 使用
          {
            echo "keystore.password=$SIGNING_STORE_PASSWORD"
            echo "key.alias=$SIGNING_KEY_ALIAS"
            echo "key.password=$SIGNING_KEY_PASSWORD"
          } > signing.properties

          echo "Signing properties generated."

      - name: Clean Build
        run: |
          ./gradlew --no-daemon clean
          # Remove build directories to ensure fresh build
          rm -rf app/build
          rm -rf .gradle
          # Clear Gradle cache for resources
          rm -rf ~/.gradle/caches/
      
      - name: Pre-release Build
        if: success()
        run: ./gradlew --no-daemon --no-build-cache app:assembleAlphaRelease

      # Delete old Prerelease-alpha
      - uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: Prerelease-alpha
          github_token: ${{ secrets.GITHUB_TOKEN }}
          delete_release: true

      - name: Tag Repo
        uses: richardsimko/update-tag@v1
        with:
          tag_name: Prerelease-alpha
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check tags
        id: check-tags
        run: |
          if git tag -l | grep -q .; then
            echo "has_tags=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tags=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Alpha
        uses: softprops/action-gh-release@v2
        if: ${{  success() }}
        with:
          tag_name: Prerelease-alpha
          files: app/build/outputs/apk/alpha/release/*
          prerelease: true
          generate_release_notes: true

      - name: Release Changelog Builder
        uses: mikepenz/release-changelog-builder-action@v4
        if: ${{ steps.check-tags.outputs.has_tags == 'true' }}
        continue-on-error: true